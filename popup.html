<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>ニコニココメント読み込み</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 15px;
      width: 320px;
    }

    h3 {
      margin-top: 0;
      font-size: 16px;
      color: #333;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    p#status {
      margin-top: 12px;
      font-size: 0.9em;
      color: #333;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h3>ニコニコ動画のURL・ID</h3>
  <input type="text" id="nico-url" placeholder="例: sm1234567 または URL">
  <button id="load-btn">コメントを読み込む</button>
  <p id="status"></p>
  <script type="module" src="src/popup.ts"></script>
</body>

</html>
